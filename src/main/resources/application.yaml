data:
  trainers:
    path: classpath:data/trainers.json
  trainees:
    path: classpath:data/trainees.json
  trainings:
    path: classpath:data/trainings.json
  trainingtypes:
    path: classpath:data/trainingTypes.json

spring:
  application:
    name: gym-crm-service
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.flyway.FlywayAutoConfiguration
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/gymcrmdb
    username: postgres
    password: myadmin1234
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
  flyway:
    enabled: false
    locations: classpath:db/migration
    baseline-on-migrate: true
  cloud:
    openfeign:
      circuitbreaker:
        enabled: true
  # ActiveMQ Configuration
  activemq:
    broker-url: ${ACTIVEMQ_BROKER_URL:tcp://localhost:61616}
    user: ${ACTIVEMQ_USER:admin}
    password: ${ACTIVEMQ_PASSWORD:admin}
    packages:
      trust-all: true
  jms:
    pub-sub-domain: false

server:
  port: 8083

# Eureka Client Configuration
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.uuid}

# Resilience4j Circuit Breaker Configuration
resilience4j:
  circuitbreaker:
    instances:
      workloadService:
        register-health-indicator: true
        sliding-window-size: 10
        minimum-number-of-calls: 5
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        wait-duration-in-open-state: 10s
        failure-rate-threshold: 50
        event-consumer-buffer-size: 10
  timelimiter:
    instances:
      workloadService:
        timeout-duration: 5s

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus, circuitbreakers
  endpoint:
    health:
      show-details: always
  health:
    circuitbreakers:
      enabled: true

# JWT Configuration
jwt:
  secret: MySecretKeyForJWTGenerationMustBeAtLeast32BytesLong

---

# Local environment
spring:
  config:
    activate:
      on-profile: local
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/gymcrm_local
    username: local_user
    password: local_password

---

# Dev environment
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://dev-server:5432/gymcrm_dev
    username: dev_user
    password: dev_password

---

# Staging environment
spring:
  config:
    activate:
      on-profile: stg
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://stg-server:5432/gymcrm_stg
    username: stg_user
    password: stg_password

---

# Production environment
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://prod-server:5432/gymcrm_prod
    username: prod_user
    password: prod_password
